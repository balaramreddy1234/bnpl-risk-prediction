<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/forms.css">
</head>
<body>

<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
  <h2 style="text-align: center;">User Login</h2>

  <form style="display: flex; flex-direction: column;">
    <input id="email" type="email" placeholder="Email" style="margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px;" required>
    <input id="password" type="password" placeholder="Password" style="margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px;" required>

    <button type="button" onclick="login()" style="margin: 10px 0; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">🔐 Login</button>
  </form>

  <p id="msg" style="text-align:center;color:red; margin: 10px 0;"></p>

  <p style="text-align: center;">
    Don't have an account? <a href="/pages/register.html">Register here</a>
  </p>
  
  <p style="text-align: center; margin-top: 20px;">
    <a href="/" style="color: #6c757d;">← Back to Home</a>
  </p>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
